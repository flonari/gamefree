<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALL I SEE IS RED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #060000;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }
  #hint {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #550000;
    font-size: 9px;
    letter-spacing: 3px;
    font-family: 'Share Tech Mono', monospace;
    text-shadow: 0 0 6px #ff000033;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">↑ ↓ ← → to move</div>
<audio id="bgMusic" src="10pmcrunchy.ogg" loop></audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bgMusic = document.getElementById('bgMusic');

// Try to play music immediately; browsers may require a user gesture first
bgMusic.volume = 0.6;
bgMusic.play().catch(() => {
  // Autoplay blocked — wait for first interaction
  const unlock = () => {
    bgMusic.play();
    window.removeEventListener('keydown', unlock);
    window.removeEventListener('click', unlock);
    window.removeEventListener('touchstart', unlock);
  };
  window.addEventListener('keydown', unlock);
  window.addEventListener('click', unlock);
  window.addEventListener('touchstart', unlock);
});

const CELL = 10;
const WALL_CHARS = ['@','%','&','$','?','!','~','^','*','+','=','<','>','/','\\','|','§','¶','Ω','Δ','Σ','Ψ','π','λ','░','▒','▓','×','÷','±','€','£','√','∞','≈','≠','∑'];
const DENSITY = 0.2;

const BOX_W = 20;
const BOX_H = 16;

let COLS, ROWS, BOX_X, BOX_Y;
let walls = new Set();
let symbolMap = {};
let player = { x: 0, y: 0 };

// Message state
let showMessage = false;
let messageOpacity = 0;
let startTime = Date.now();
const MESSAGE_DELAY = 0.5 * 60 * 1000; // 2 minutes in ms
let messageTriggered = false;

function cellKey(x, y) { return `${x},${y}`; }

function isInBox(x, y) {
  return x >= BOX_X && x < BOX_X + BOX_W && y >= BOX_Y && y < BOX_Y + BOX_H;
}

function isBoxBorder(x, y) {
  const onLeft   = x === BOX_X - 1;
  const onRight  = x === BOX_X + BOX_W;
  const onTop    = y === BOX_Y - 1;
  const onBot    = y === BOX_Y + BOX_H;
  const inXRange = x >= BOX_X - 1 && x <= BOX_X + BOX_W;
  const inYRange = y >= BOX_Y - 1 && y <= BOX_Y + BOX_H;
  return (onLeft || onRight) && inYRange || (onTop || onBot) && inXRange;
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  COLS = Math.floor(canvas.width  / CELL);
  ROWS = Math.floor(canvas.height / CELL);
  BOX_X = Math.floor((COLS - BOX_W) / 2);
  BOX_Y = Math.floor((ROWS - BOX_H) / 2);
  generate();
}

function generate() {
  walls.clear();
  symbolMap = {};
  player = {
    x: BOX_X + Math.floor(BOX_W / 2),
    y: BOX_Y + Math.floor(BOX_H / 2)
  };

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (isInBox(x, y))     continue;
      if (isBoxBorder(x, y)) continue;
      if (x >= BOX_X - 2 && x <= BOX_X + BOX_W + 1 &&
          y >= BOX_Y - 2 && y <= BOX_Y + BOX_H + 1) continue;

      if (Math.random() < DENSITY) {
        const k = cellKey(x, y);
        walls.add(k);
        symbolMap[k] = WALL_CHARS[Math.floor(Math.random() * WALL_CHARS.length)];
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#060000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Scanlines
  for (let y = 0; y < ROWS; y++) {
    if (y % 2 === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, y * CELL, canvas.width, CELL);
    }
  }

  ctx.font = `bold ${CELL - 1}px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Symbol walls
  for (const key of walls) {
    const [wx, wy] = key.split(',').map(Number);
    const shade = 60 + ((wx * 17 + wy * 11) % 90);
    ctx.fillStyle = `rgb(${shade + 50}, 0, 0)`;
    ctx.shadowColor = '#ff000044';
    ctx.shadowBlur = 3;
    ctx.fillText(symbolMap[key], wx * CELL + CELL / 2, wy * CELL + CELL / 2);
  }
  ctx.shadowBlur = 0;

  // Hashtag box border
  ctx.fillStyle = '#dd0000';
  ctx.shadowColor = '#ff0000cc';
  ctx.shadowBlur = 10;

  for (let x = BOX_X - 1; x <= BOX_X + BOX_W; x++) {
    drawChar('#', x, BOX_Y - 1);
    drawChar('#', x, BOX_Y + BOX_H);
  }
  for (let y = BOX_Y; y < BOX_Y + BOX_H; y++) {
    drawChar('#', BOX_X - 1, y);
    drawChar('#', BOX_X + BOX_W, y);
  }
  ctx.shadowBlur = 0;

  // Player dot
  const px = player.x * CELL + CELL / 2;
  const py = player.y * CELL + CELL / 2;

  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 22;
  ctx.fillStyle = '#ff3300';
  ctx.beginPath();
  ctx.arc(px, py, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff7755';
  ctx.beginPath();
  ctx.arc(px, py, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(px, py, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // "come back... later" message inside the box
  if (showMessage && messageOpacity > 0) {
    const boxCenterX = (BOX_X + BOX_W / 2) * CELL;
    const boxCenterY = (BOX_Y + BOX_H / 2) * CELL;

    // Slow flicker on top of the fade
    const flicker = 0.85 + Math.sin(Date.now() * 0.003) * 0.15;
    const alpha = messageOpacity * flicker;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Glow pass
    ctx.font = `bold 11px 'Share Tech Mono', monospace`;
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 18;
    ctx.fillText('come back...', boxCenterX, boxCenterY - 10);
    ctx.fillText('later', boxCenterX, boxCenterY + 8);

    // Crisp pass
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff6644';
    ctx.fillText('come back...', boxCenterX, boxCenterY - 10);
    ctx.fillStyle = '#ff6644';
    ctx.fillText('later', boxCenterX, boxCenterY + 8);

    ctx.restore();
  }
}

function drawChar(ch, cx, cy) {
  ctx.fillText(ch, cx * CELL + CELL / 2, cy * CELL + CELL / 2);
}

function tryMove(dx, dy) {
  const nx = player.x + dx;
  const ny = player.y + dy;
  if (nx < BOX_X || nx >= BOX_X + BOX_W) return;
  if (ny < BOX_Y || ny >= BOX_Y + BOX_H) return;
  player.x = nx;
  player.y = ny;
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    e.preventDefault(); tryMove(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); tryMove(0,  1); break;
    case 'ArrowLeft':  e.preventDefault(); tryMove(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); tryMove( 1, 0); break;
  }
});

let tx = 0, ty = 0;
window.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else tryMove(0, dy > 0 ? 1 : -1);
}, { passive: true });

window.addEventListener('resize', resize);

// Main loop
(function loop() {
  const elapsed = Date.now() - startTime;

  // Trigger message after 2 minutes
  if (!messageTriggered && elapsed >= MESSAGE_DELAY) {
    messageTriggered = true;
    showMessage = true;
  }

  // Fade in message over ~3 seconds once triggered
  if (showMessage && messageOpacity < 1) {
    messageOpacity = Math.min(1, messageOpacity + 0.005);
  }

  draw();
  requestAnimationFrame(loop);
})();

resize();
</script>
</body>
</html>
