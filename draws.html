<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE IMAGES SAY MORE THAN WORDS</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 32px;
        }

        #panel {
            position: relative;
            width: 250px;
            height: 463px;
            flex-shrink: 0;
        }

        #panel-img {
            position: absolute;
            top: 0; left: 0;
            width: 250px;
            height: 463px;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #links {
            position: absolute;
            left: 45px;
            top: 134px;
            width: 191px;
            height: 305px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: center;
            align-items: center;
            gap: 18px;
            overflow: hidden;
        }

        #links a {
            color: #a8ff5a;
            text-decoration: underline;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            line-height: 1.2;
            text-shadow:
                0 0 4px #000,
                0 0 8px #000,
                0 0 10px #6ed632,
                0 0 20px #6ed632,
                0 0 30px #4aad1a,
                2px 2px 6px #000;
        }
        #links a:visited {
            color: #6ed632;
            text-shadow:
                0 0 4px #000,
                0 0 8px #3a7a10,
                0 0 16px #3a7a10,
                2px 2px 6px #000;
        }
        #links a:hover {
            color: #dfffaa;
            text-shadow:
                0 0 4px #000,
                0 0 10px #9fff4c,
                0 0 22px #9fff4c,
                0 0 40px #6ed632,
                2px 2px 6px #000;
        }

        #image-view {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            justify-content: center;
            align-items: center;
        }

        #img-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
        }

        #img-wrapper img {
            max-width: 90vw;
            max-height: 90vh;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #img-wrapper img.big {
            max-width: 160vw;
            max-height: 160vh;
            width: 160vw;
        }

        #back-btn {
            position: absolute;
            top: -20px;
            right: 0;
            font-family: monospace;
            font-size: 11px;
            color: #3a7a10;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }
        #back-btn:hover { color: #6ed632; }
    </style>
</head>
<body>
    <audio src="ambient2.ogg" autoplay loop></audio>

    <div id="panel">
        <img id="panel-img" src="drawspanel.png" alt="">
        <div id="links">
            <a onclick="showImage('49.png', true)">11.04.2026</a>
            <a onclick="showImage('thisday.png', true)">12.04.2026</a>
            <a onclick="showImage('geniuswayaheadhistime.png', false)">20.04.2026</a>
        </div>
    </div>

    <div id="image-view">
        <div id="img-wrapper">
            <button id="back-btn" onclick="goBack()">← back</button>
            <img id="draw-img" src="" alt="">
        </div>
    </div>

    <script>
        function showImage(src, big) {
            const file = Math.random() < 0.5 ? "c1.ogg" : "c2.ogg";
            new Audio(file).play();
            const img = document.getElementById("draw-img");
            img.src = src;
            img.className = big ? "big" : "";
            document.getElementById("image-view").style.display = "flex";
        }
        function goBack() {
            document.getElementById("image-view").style.display = "none";
            document.getElementById("draw-img").src = "";
        }
    </script>
</body>
</html>
