<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE IMAGES SAY MORE THAN WORDS</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-top: 32px;
        }

        .links {
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
            font-family: monospace;
            font-size: 13px;
            height: fit-content;
        }

        .links a {
            color: #6ed632;
            text-decoration: underline;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .links a:visited {
            color: #3a7a10;
        }

        .links a:hover {
            color: #9fff4c;
        }

        #image-view {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #image-view img {
            width: 200%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #back-btn {
            font-family: monospace;
            font-size: 11px;
            color: #3a7a10;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
        }

        #back-btn:hover {
            color: #6ed632;
        }
    </style>
</head>
<body>
    <audio src="ambient2.ogg" autoplay loop></audio>
    <div class="links" id="links">
        <a onclick="showImage('49.png')">11.04.2026</a>
        <a onclick="showImage('thisday.png')">12.04.2026</a>
        <a onclick="showImage('geniuswayaheadhistime.png')">20.04.2026</a>
    </div>

    <div id="image-view">
        <img id="draw-img" src="" alt="">
        <button id="back-btn" onclick="goBack()">← back</button>
    </div>

    <script>
        function showImage(src) {
            const file = Math.random() < 0.5 ? "c1.ogg" : "c2.ogg";
            new Audio(file).play();
            document.getElementById("links").style.display = "none";
            const view = document.getElementById("image-view");
            document.getElementById("draw-img").src = src;
            view.style.display = "flex";
        }

        function goBack() {
            document.getElementById("image-view").style.display = "none";
            document.getElementById("draw-img").src = "";
            document.getElementById("links").style.display = "flex";
        }
    </script>
</body>
</html>
