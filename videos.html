<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I YELL AT MY TV FOR ITS HORRIBLE CRIMES</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #6ed632;
        }

        /* scanlines */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.2) 2px,
                rgba(0,0,0,0.2) 4px
            );
            pointer-events: none;
            z-index: 9000;
        }

        /* header */
        #site-header {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        #site-title {
            font-size: 8px;
            color: #2a5c0a;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #back-btn {
            font-family: monospace;
            font-size: 8px;
            color: #2a5c0a;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid #1a4a06;
            padding: 3px 7px;
            background: transparent;
        }

        #back-btn:hover {
            color: #6ed632;
            border-color: #4caf1a;
        }

        /* player */
        #player-wrap {
            position: relative;
            width: 480px;
            border: 2px solid #4caf1a;
            background: #000;
            box-shadow: 0 0 24px rgba(78,175,26,0.06);
        }

        /* screen */
        #screen-area {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        #main-video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            filter: contrast(1.05) brightness(0.85) saturate(0.55);
        }

        /* no signal */
        #no-signal {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            background: #000;
        }

        #no-signal.visible { display: flex; }

        .tv-bars {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                #fff    0%,   #fff    12.5%,
                #ff0   12.5%, #ff0    25%,
                #0ff   25%,   #0ff    37.5%,
                #0f0   37.5%, #0f0    50%,
                #f0f   50%,   #f0f    62.5%,
                #f00   62.5%, #f00    75%,
                #00f   75%,   #00f    87.5%,
                #000   87.5%, #000   100%
            );
            opacity: 0.13;
        }

        .ns-text {
            font-family: monospace;
            font-size: 10px;
            color: #6ed632;
            letter-spacing: 5px;
            text-transform: uppercase;
            z-index: 1;
            text-shadow: 0 0 6px #4caf1a;
            animation: ns-blink 3s steps(1) infinite;
            margin-bottom: 8px;
        }

        .ns-sub {
            font-family: monospace;
            font-size: 8px;
            color: #2a5c0a;
            letter-spacing: 3px;
            z-index: 1;
            text-transform: uppercase;
        }

        @keyframes ns-blink {
            0%, 80%, 84%, 88%, 100% { opacity: 1; }
            82%, 86%                 { opacity: 0; }
        }

        /* vhs tracking line */
        #tracking-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(110,214,50,0.12);
            pointer-events: none;
            z-index: 10;
            animation: tracking 11s linear infinite;
            mix-blend-mode: screen;
        }

        @keyframes tracking {
            0%   { top: -4px; }
            100% { top: 100%; }
        }

        /* paused blink */
        #paused-label {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 9px;
            color: #6ed632;
            letter-spacing: 3px;
            opacity: 0;
            z-index: 20;
            animation: blink 1s steps(1) infinite;
            text-shadow: 0 0 5px #4caf1a;
        }

        #paused-label.visible { opacity: 1; }

        @keyframes blink {
            0%, 49%  { opacity: 1; }
            50%, 100% { opacity: 0.15; }
        }

        /* controls */
        #controls {
            border-top: 1px solid #1a4a06;
            padding: 7px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #040404;
        }

        #progress-wrap {
            width: 100%;
            height: 5px;
            background: #0d1f05;
            border: 1px solid #1a4a06;
            cursor: pointer;
            position: relative;
        }

        #progress-fill {
            height: 100%;
            background: #4caf1a;
            width: 0%;
        }

        #ctrl-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn {
            font-family: monospace;
            font-size: 8px;
            color: #2a5c0a;
            background: transparent;
            border: 1px solid #1a4a06;
            padding: 3px 7px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ctrl-btn:hover, .ctrl-btn.active {
            color: #6ed632;
            border-color: #4caf1a;
        }

        #time-display {
            font-size: 8px;
            color: #1a4a06;
            letter-spacing: 2px;
            margin-left: auto;
        }

        /* status */
        #status-bar {
            width: 480px;
            display: flex;
            justify-content: space-between;
            padding: 5px 0 0;
            font-size: 7px;
            color: #1a4a06;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="site-header">
        <span id="site-title">// GAMEFREE.WIN // VIDEOS //</span>
        <button id="back-btn" onclick="window.location.href='/'">← BACK</button>
    </div>

    <div id="player-wrap">
        <div id="screen-area" onclick="togglePlay()">
            <video id="main-video" src="video.mp4" preload="metadata"></video>
            <div id="tracking-line"></div>
            <div id="paused-label">■ PAUSED</div>
            <div id="no-signal">
                <div class="tv-bars"></div>
                <div class="ns-text">// NO SIGNAL //</div>
                <div class="ns-sub">check up on it later</div>
            </div>
        </div>

        <div id="controls">
            <div id="progress-wrap" onclick="seekTo(event)">
                <div id="progress-fill"></div>
            </div>
            <div id="ctrl-row">
                <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
                <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()">VOL ON</button>
                <span id="time-display">00:00 / 00:00</span>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <span id="status-left">RDY_</span>
        <span id="status-right"></span>
    </div>

    <script>
        const video    = document.getElementById('main-video');
        const playBtn  = document.getElementById('play-btn');
        const muteBtn  = document.getElementById('mute-btn');
        const progFill = document.getElementById('progress-fill');
        const timeDsp  = document.getElementById('time-display');
        const pausedLbl= document.getElementById('paused-label');
        const statusL  = document.getElementById('status-left');
        const statusR  = document.getElementById('status-right');

        function fmt(s) {
            if (isNaN(s)) return '00:00';
            return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(Math.floor(s%60)).padStart(2,'0');
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '■ STOP';
                playBtn.classList.add('active');
                pausedLbl.classList.remove('visible');
                statusL.textContent = 'PLAYING_';
            } else {
                video.pause();
                playBtn.textContent = '▶ PLAY';
                playBtn.classList.remove('active');
                pausedLbl.classList.add('visible');
                statusL.textContent = 'PAUSED_';
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? 'VOL OFF' : 'VOL ON';
            muteBtn.classList.toggle('active', video.muted);
        }

        function seekTo(e) {
            if (!video.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
        }

        video.addEventListener('timeupdate', function () {
            if (!video.duration) return;
            progFill.style.width = (video.currentTime / video.duration * 100) + '%';
            timeDsp.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
            statusR.textContent = new Date().toLocaleTimeString('en-GB', {hour12:false});
        });

        video.addEventListener('ended', function () {
            playBtn.textContent = '▶ PLAY';
            playBtn.classList.remove('active');
            pausedLbl.classList.remove('visible');
            statusL.textContent = 'END_';
        });

        // show no-signal if video fails to load
        video.addEventListener('error', function () {
            document.getElementById('no-signal').classList.add('visible');
            video.style.display = 'none';
            statusL.textContent = 'NO_SIGNAL_';
        });

        video.addEventListener('loadedmetadata', function () {
            document.getElementById('no-signal').classList.remove('visible');
            video.style.display = 'block';
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        });
    </script>

</body>
</html>
