<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMEFREE.WIN</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-image-wrap {
            position: relative;
            display: block;
            line-height: 0;
        }

        .main-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .game-zone {
            position: absolute;
            left: 164px;
            top: 267px;
            width: 79px;
            height: 71px;
            cursor: pointer;
        }

        .taskbar {
            position: relative;
            width: 100%;
        }

        .taskbar img {
            width: 100%;
            display: block;
        }

        .click-zone {
            position: absolute;
            left: 19px;
            top: 10px;
            width: 69px;
            height: 28px;
            cursor: pointer;
        }

        .about {
            display: none;
            margin-top: 8px;
            width: 310px;
            background-color: #c0c0c0;
            border: 3px outset #c0c0c0;
            font-family: Comic Sans MS, Arial, sans-serif;
            font-size: 13px;
            color: #000080;
            padding: 4px;
            text-align: center;
        }

        .about p {
            margin: 6px 2px;
            line-height: 1.8;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-image-wrap">
            <img src="gamerfre.png" class="main-image" alt="main image">
            <div class="game-zone" onclick="playGameSound()"></div>
        </div>
        </div>
        <div class="taskbar">
            <img src="takbasr14.png" alt="taskbar">
            <div class="click-zone" onclick="toggleAbout()"></div>
        </div>
    </div>

    <div class="about" id="about">
        <p>
            the <br>
            gamerfree.win zxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcm <br>
            play the games / watch the films blarghblorghblorghblar <br>
            NNaNNaNNaNNaNNaNNaNNaNNa
        </p>
        the website is on version 0.1.1  a state that has nothing done
    </div>

    <script>
        let currentGameAudio = null;

        function playGameSound() {
            if (currentGameAudio && !currentGameAudio.ended) return;
            const zone = document.querySelector(".game-zone");
            const track = Math.floor(Math.random() * 7) + 1;
            currentGameAudio = new Audio("game" + track + ".ogg");
            currentGameAudio.play();
            zone.style.cursor = "default";
            currentGameAudio.addEventListener("ended", function () {
                zone.style.cursor = "pointer";
            });
        }

        function playClickSound() {
            const file = Math.random() < 0.5 ? "c1.ogg" : "c2.ogg";
            const audio = new Audio(file);
            audio.play();
        }

        function toggleAbout() {
            playClickSound();
            const about = document.getElementById("about");
            about.style.display = (about.style.display === "block") ? "none" : "block";
        }
    </script>

</body>
</html>
