<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMEFREE.WIN</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-image-wrap {
            position: relative;
            display: block;
            line-height: 0;
        }

        .main-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .game-zone {
            position: absolute;
            left: 164px;
            top: 267px;
            width: 79px;
            height: 71px;
            cursor: pointer;
        }

        .taskbar {
            position: relative;
            width: 100%;
        }

        .taskbar img {
            width: 100%;
            display: block;
        }

        .click-zone {
            position: absolute;
            left: 19px;
            top: 10px;
            width: 69px;
            height: 28px;
            cursor: pointer;
        }

        .collection-zone {
            position: absolute;
            left: 124px;
            top: 11px;
            width: 105px;
            height: 25px;
            cursor: pointer;
        }

        .draws-zone {
            position: absolute;
            left: 265px;
            top: 9px;
            width: 75px;
            height: 31px;
            cursor: pointer;
        }

        .videos-zone {
            position: absolute;
            left: 450px;
            top: 9px;
            width: 75px;
            height: 31px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 9px;
            color: #6ed632;
            letter-spacing: 2px;
            text-transform: uppercase;
        }



        /* ── ABOUT ── */
        .about {
            display: none;
            margin-top: 8px;
            width: 310px;
            border: 2px solid #4caf1a;
            background: #0a0a0a;
            font-family: monospace;
            font-size: 11px;
            color: #6ed632;
        }

        .about-header {
            border-bottom: 2px solid #4caf1a;
            padding: 4px 8px;
            color: #4caf1a;
            letter-spacing: 3px;
            font-size: 9px;
            text-transform: uppercase;
        }

        .about-body {
            padding: 10px 12px;
            color: #6ed632;
            line-height: 1.9;
            word-break: break-all;
            font-size: 11px;
        }

        /* ── GLITCH ── */
        @keyframes glitch-shake {
            0%   { transform: translate(0, 0) skewX(0deg); }
            10%  { transform: translate(-6px, 3px) skewX(-2deg); }
            20%  { transform: translate(8px, -4px) skewX(1deg); }
            30%  { transform: translate(-3px, 6px) skewX(3deg); }
            40%  { transform: translate(10px, -2px) skewX(-1deg); }
            50%  { transform: translate(-8px, 5px) skewX(2deg); }
            60%  { transform: translate(5px, -7px) skewX(-3deg); }
            70%  { transform: translate(-10px, 2px) skewX(1deg); }
            80%  { transform: translate(7px, -5px) skewX(-2deg); }
            90%  { transform: translate(-4px, 8px) skewX(3deg); }
            100% { transform: translate(0, 0) skewX(0deg); }
        }

        body.glitching {
            animation: glitch-shake 0.18s steps(1) infinite;
        }

        #blackout {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
        }

        #fade-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 99999;
            opacity: 0;
            transition: opacity 1.8s ease;
        }

        /* ── VISIT COUNTER ── */
        #visit-counter {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 10px 0 4px;
        }

        #vc-wrap {
            background: transparent;
            font-family: monospace;
            color: #888780;
            padding: 4px 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        #vc-dot {
            width: 4px;
            height: 4px;
            background: #888780;
            border-radius: 50%;
            flex-shrink: 0;
            animation: vc-blink 1.1s steps(1) infinite;
            display: none;
        }

        #vc-label { display: none; }

        #vc-digits {
            display: flex;
            gap: 1px;
            align-items: center;
        }

        .vc-digit {
            color: #888780;
            font-family: monospace;
            font-size: 18px;
            width: 13px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .vc-digit.glitch { color: #B4B2A9; }
        .vc-digit.dead   { color: #2C2C2A; }

        #vc-sfx { display: none; }

        @keyframes vc-blink {
            0%, 49%  { background: #888780; }
            50%, 100% { background: transparent; }
        }
    </style>
</head>
<body>
<audio src="ambient2.ogg" autoplay loop></audio>

    <!-- VISIT COUNTER -->
    <div id="visit-counter">
        <div id="vc-wrap">
            <div id="vc-dot"></div>
            <span id="vc-label">// visitors //</span>
            <div id="vc-digits"></div>
            <span id="vc-sfx">unique</span>
        </div>
    </div>

    <div class="container">
        <div class="main-image-wrap">
            <img src="gamerfre.png" class="main-image" alt="main image">
            <div class="game-zone" onclick="playGameSound()"></div>
        </div>
        <div class="taskbar">
            <img src="takbasrceacsd.png" alt="taskbar">
            <div class="click-zone" onclick="toggleAbout()"></div>
            <div class="collection-zone" onclick="toggleCollection()"></div>
            <div class="draws-zone" onclick="goToDraws()"></div>
            <div class="videos-zone" onclick="goToVideos()"></div>
        </div>
    </div>

    <div class="about" id="about">
        <div class="about-header">// about //</div>
        <div class="about-body">
            the <br>
            gamerfree.win zxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcm <br>
            play the games / watch the films blarghblorghblorghblar <br>
            NNaNNaNNaNNaNNaNNaNNaNNa
        </div>
    </div>



    <div id="fade-overlay"></div>
    <div id="blackout"></div>

    <script>
        /* ── VISIT COUNTER ── */
        (function () {
            var BASE = 1200, DIGITS = 3;
            function getCount() { return BASE; }
            function render() {
                var n = String(getCount()).padStart(DIGITS, '0');
                var gi = Math.random() < 0.25 ? Math.floor(Math.random() * DIGITS) : -1;
                var di = Math.random() < 0.12 ? Math.floor(Math.random() * DIGITS) : -1;
                if (di === gi) di = -1;
                var c = document.getElementById('vc-digits');
                c.innerHTML = '';
                for (var i = 0; i < n.length; i++) {
                    var d = document.createElement('div');
                    d.className = 'vc-digit';
                    if (i === gi) { d.classList.add('glitch'); d.textContent = '??%!#@'[Math.floor(Math.random() * 6)]; }
                    else if (i === di) { d.classList.add('dead'); d.textContent = n[i]; }
                    else { d.textContent = n[i]; }
                    c.appendChild(d);
                }
                var opts = ['unique', 'or???', 'souls', 'visits', 'unknwn', 'unique'];
                document.getElementById('vc-sfx').textContent = opts[Math.floor(Math.random() * opts.length)];
            }
            render();
            setInterval(render, 2800);
            setInterval(function () {
                if (Math.random() < 0.2) {
                    var w = document.getElementById('vc-wrap');
                    w.style.transform = 'translate(' + (Math.random() * 3 - 1.5) + 'px,' + (Math.random() * 1.5 - 0.75) + 'px)';
                    setTimeout(function () { w.style.transform = ''; }, 80);
                }
            }, 1800);
            setInterval(function () {
                var ds = document.querySelectorAll('.vc-digit:not(.glitch):not(.dead)');
                if (ds.length && Math.random() < 0.3) {
                    var d = ds[Math.floor(Math.random() * ds.length)], o = d.textContent;
                    d.style.color = '#B4B2A9';
                    d.textContent = '??%!#@'[Math.floor(Math.random() * 6)];
                    setTimeout(function () { d.style.color = ''; d.textContent = o; }, 90);
                }
            }, 700);
        })();

        /* ── GAME AUDIO ── */
        let currentGameAudio = null;

        function triggerGlitch() {
            const audio = new Audio("game3.ogg");
            currentGameAudio = audio;
            const zone = document.querySelector(".game-zone");
            zone.style.cursor = "default";
            audio.play();

            const container = document.querySelector(".container");
            const about = document.getElementById("about");
            const elements = [container, about].filter(Boolean);

            let moveInterval = null;
            let flickerInterval = null;
            let flickerPeriod = 500;
            let flickerAccelId = null;
            let flickerVisible = true;
            const flickerOverlay = document.getElementById("blackout");

            function startFlicker() {
                if (flickerInterval) clearInterval(flickerInterval);
                flickerInterval = setInterval(function () {
                    flickerVisible = !flickerVisible;
                    flickerOverlay.style.display = flickerVisible ? "none" : "block";
                }, flickerPeriod / 2);
            }

            function accelerateFlicker() {
                flickerPeriod = Math.max(40, flickerPeriod * 0.78);
                startFlicker();
            }

            setTimeout(function () {
                moveInterval = setInterval(function () {
                    elements.forEach(function (el) {
                        const x = (Math.random() - 0.5) * 60;
                        const y = (Math.random() - 0.5) * 40;
                        el.style.transform = "translate(" + x + "px, " + y + "px)";
                    });
                }, 80);
                startFlicker();
                flickerAccelId = setInterval(accelerateFlicker, 400);
            }, 1500);

            audio.addEventListener("loadedmetadata", function () {
                const blackoutAt = (audio.duration - 0.8) * 1000;
                setTimeout(function () {
                    clearInterval(moveInterval);
                    clearInterval(flickerInterval);
                    clearInterval(flickerAccelId);
                    elements.forEach(function (el) {
                        el.style.transform = "";
                        el.style.visibility = "visible";
                    });
                    flickerOverlay.style.display = "block";
                }, blackoutAt);
            });

            audio.addEventListener("ended", function () {
                location.reload();
            });
        }

        function playGameSound() {
            if (currentGameAudio && !currentGameAudio.ended) return;
            const zone = document.querySelector(".game-zone");
            const roll = Math.random();
            if (roll < 0.01) { triggerGlitch(); return; }
            const pool = [1, 2, 4, 5, 6, 7];
            const track = pool[Math.floor(Math.random() * pool.length)];
            currentGameAudio = new Audio("game" + track + ".ogg");
            currentGameAudio.play();
            zone.style.cursor = "default";
            currentGameAudio.addEventListener("ended", function () {
                zone.style.cursor = "pointer";
            });
        }

        document.addEventListener("keydown", function (e) {
            if (e.key === "Tab") {
                e.preventDefault();
                if (currentGameAudio && !currentGameAudio.ended) return;
                triggerGlitch();
            }
        });

        /* ── CLICK SOUNDS ── */
        function playClickSound() {
            const file = Math.random() < 0.5 ? "c1.ogg" : "c2.ogg";
            new Audio(file).play();
        }

        /* ── NAVIGATION ── */
        function goToDraws() {
            const overlay = document.getElementById("fade-overlay");
            overlay.style.display = "block";
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    overlay.style.opacity = "1";
                });
            });
            setTimeout(function () {
                window.location.href = "/draws";
            }, 2000);
        }

        function goToVideos() {
            const blackout = document.getElementById("blackout");
            const container = document.querySelector(".container");
            const about = document.getElementById("about");
            const allEls = [container, about, counter];

            let flickerInterval = null;
            let shakeInterval = null;
            let flickerPeriod = 120;
            let visible = true;
            let elapsed = 0;
            const freakDuration = 2800;
            const pauseDuration = 600;

            shakeInterval = setInterval(function () {
                allEls.forEach(function (el) {
                    if (!el) return;
                    const x = (Math.random() - 0.5) * 80;
                    const y = (Math.random() - 0.5) * 50;
                    const skew = (Math.random() - 0.5) * 6;
                    el.style.transform = "translate(" + x + "px," + y + "px) skewX(" + skew + "deg)";
                });
            }, 60);

            function runFlicker() {
                flickerInterval = setInterval(function () {
                    elapsed += flickerPeriod;
                    visible = !visible;
                    blackout.style.display = visible ? "none" : "block";
                    flickerPeriod = Math.max(30, flickerPeriod * 0.92);
                    clearInterval(flickerInterval);
                    if (elapsed >= freakDuration) {
                        clearInterval(shakeInterval);
                        allEls.forEach(function (el) {
                            if (!el) return;
                            el.style.transform = "";
                            el.style.visibility = "hidden";
                        });
                        blackout.style.display = "block";
                        setTimeout(function () {
                            window.location.href = "/videos";
                        }, pauseDuration);
                    } else {
                        runFlicker();
                    }
                }, flickerPeriod);
            }

            runFlicker();
        }

        /* ── TOGGLE PANELS ── */
        function toggleCollection() {
            playClickSound();
            window.location.href = "/discs";
        }

        function toggleAbout() {
            playClickSound();
            const about = document.getElementById("about");
            const col = document.getElementById("collection");
            col.style.display = "none";
            about.style.display = (about.style.display === "block") ? "none" : "block";
        }


    </script>

</body>
</html>
