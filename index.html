<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMEFREE.WIN</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-image-wrap {
            position: relative;
            display: block;
            line-height: 0;
        }

        .main-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .game-zone {
            position: absolute;
            left: 164px;
            top: 267px;
            width: 79px;
            height: 71px;
            cursor: pointer;
        }

        .taskbar {
            position: relative;
            width: 100%;
        }

        .taskbar img {
            width: 100%;
            display: block;
        }

        .click-zone {
            position: absolute;
            left: 19px;
            top: 10px;
            width: 69px;
            height: 28px;
            cursor: pointer;
        }

        .collection-zone {
            position: absolute;
            left: 124px;
            top: 11px;
            width: 105px;
            height: 25px;
            cursor: pointer;
        }

        .collection {
            display: none;
            margin-top: 8px;
            width: 370px;
            border: 1px solid #4a4a4a;
            border-right-color: #333;
            border-bottom-color: #333;
            background: transparent;
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
        }

        .collection-header {
            border-bottom: 1px solid #4a4a4a;
            padding: 3px 8px 4px 6px;
            color: #666;
            letter-spacing: 3px;
            font-size: 9px;
            text-transform: uppercase;
        }

        .collection-slots {
            display: flex;
            gap: 0;
        }

        .collection-slot {
            flex: 1;
            border-right: 1px solid #3f3f3f;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 9px 6px 7px;
            gap: 6px;
        }

        .collection-slot:last-child {
            border-right: none;
        }

        .collection-slot-img {
            width: 64px;
            height: 64px;
            border: 1px solid #3a3a3a;
            border-right-color: #222;
            border-bottom-color: #222;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .collection-slot-img::before,
        .collection-slot-img::after {
            content: "";
            position: absolute;
            background: #3a3a3a;
        }

        .collection-slot-img::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .collection-slot-img::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        .collection-slot-label {
            color: #484848;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .about {
            display: none;
            margin-top: 8px;
            width: 310px;
            border: 1px solid #4a4a4a;
            border-right-color: #333;
            border-bottom-color: #333;
            background: transparent;
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
        }

        .about-header {
            border-bottom: 1px solid #4a4a4a;
            padding: 3px 8px 4px 6px;
            color: #666;
            letter-spacing: 3px;
            font-size: 9px;
            text-transform: uppercase;
        }

        .about-body {
            padding: 10px 12px;
            color: #888;
            line-height: 1.9;
            word-break: break-all;
            font-size: 11px;
        }
        @keyframes glitch-shake {
            0%   { transform: translate(0, 0) skewX(0deg); }
            10%  { transform: translate(-6px, 3px) skewX(-2deg); }
            20%  { transform: translate(8px, -4px) skewX(1deg); }
            30%  { transform: translate(-3px, 6px) skewX(3deg); }
            40%  { transform: translate(10px, -2px) skewX(-1deg); }
            50%  { transform: translate(-8px, 5px) skewX(2deg); }
            60%  { transform: translate(5px, -7px) skewX(-3deg); }
            70%  { transform: translate(-10px, 2px) skewX(1deg); }
            80%  { transform: translate(7px, -5px) skewX(-2deg); }
            90%  { transform: translate(-4px, 8px) skewX(3deg); }
            100% { transform: translate(0, 0) skewX(0deg); }
        }

        @keyframes flicker {
            0%   { visibility: visible; }
            49%  { visibility: visible; }
            50%  { visibility: hidden; }
            99%  { visibility: hidden; }
            100% { visibility: visible; }
        }

        body.glitching {
            animation: glitch-shake 0.18s steps(1) infinite, glitch-colors 0.25s steps(1) infinite;
        }

        #blackout {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-image-wrap">
            <img src="gamerfre.png" class="main-image" alt="main image">
            <div class="game-zone" onclick="playGameSound()"></div>
        </div>
        </div>
        <div class="taskbar">
            <img src="takbasr14.png" alt="taskbar">
            <div class="click-zone" onclick="toggleAbout()"></div>
            <div class="collection-zone" onclick="toggleCollection()"></div>
        </div>
    </div>

    <div class="about" id="about">
        <div class="about-header">// about //</div>
        <div class="about-body">
            the <br>
            gamerfree.win zxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcm <br>
            play the games / watch the films blarghblorghblorghblar <br>
            NNaNNaNNaNNaNNaNNaNNaNNa
        </div>
    </div>

    <div class="collection" id="collection">
        <div class="collection-header">// collection //</div>
        <div class="collection-slots">
            <div class="collection-slot">
                <div class="collection-slot-img"></div>
                <div class="collection-slot-label">slot 1</div>
            </div>
            <div class="collection-slot">
                <div class="collection-slot-img"></div>
                <div class="collection-slot-label">slot 2</div>
            </div>
            <div class="collection-slot">
                <div class="collection-slot-img"></div>
                <div class="collection-slot-label">slot 3</div>
            </div>
        </div>
    </div>

    <script>
        let currentGameAudio = null;

        function triggerGlitch() {
            const audio = new Audio("game3.ogg");
            currentGameAudio = audio;
            const zone = document.querySelector(".game-zone");
            zone.style.cursor = "default";
            audio.play();

            const container = document.querySelector(".container");
            const about = document.getElementById("about");
            const elements = [container, about].filter(Boolean);

            let moveInterval = null;
            let flickerInterval = null;
            let flickerPeriod = 500; // ms, starts at 0.5s
            let flickerAccelId = null;
            let flickerVisible = true;

            const flickerOverlay = document.getElementById("blackout");

            function startFlicker() {
                if (flickerInterval) clearInterval(flickerInterval);
                flickerInterval = setInterval(function () {
                    flickerVisible = !flickerVisible;
                    flickerOverlay.style.display = flickerVisible ? "none" : "block";
                }, flickerPeriod / 2);
            }

            function accelerateFlicker() {
                flickerPeriod = Math.max(40, flickerPeriod * 0.78);
                startFlicker();
            }

            // 1.5s in: start moving elements around
            setTimeout(function () {
                moveInterval = setInterval(function () {
                    elements.forEach(function (el) {
                        const x = (Math.random() - 0.5) * 60;
                        const y = (Math.random() - 0.5) * 40;
                        el.style.transform = "translate(" + x + "px, " + y + "px)";
                    });
                }, 80);

                // Start flicker at 0.5s period, then accelerate every 400ms
                startFlicker();
                flickerAccelId = setInterval(accelerateFlicker, 400);
            }, 1500);

            // Blackout 0.8s before end
            audio.addEventListener("loadedmetadata", function () {
                const blackoutAt = (audio.duration - 0.8) * 1000;
                setTimeout(function () {
                    clearInterval(moveInterval);
                    clearInterval(flickerInterval);
                    clearInterval(flickerAccelId);
                    elements.forEach(function (el) {
                        el.style.transform = "";
                        el.style.visibility = "visible";
                    });
                    flickerOverlay.style.display = "block";
                }, blackoutAt);
            });

            audio.addEventListener("ended", function () {
                location.reload();
            });
        }

        function playGameSound() {
            if (currentGameAudio && !currentGameAudio.ended) return;
            const zone = document.querySelector(".game-zone");

            const roll = Math.random();
            if (roll < 0.01) {
                triggerGlitch();
                return;
            }

            // pick from game1-7 but skip game3
            const pool = [1,2,4,5,6,7];
            const track = pool[Math.floor(Math.random() * pool.length)];
            currentGameAudio = new Audio("game" + track + ".ogg");
            currentGameAudio.play();
            zone.style.cursor = "default";
            currentGameAudio.addEventListener("ended", function () {
                zone.style.cursor = "pointer";
            });
        }

        document.addEventListener("keydown", function (e) {
            if (e.key === "Tab") {
                e.preventDefault();
                if (currentGameAudio && !currentGameAudio.ended) return;
                triggerGlitch();
            }
        });

        function playClickSound() {
            const file = Math.random() < 0.5 ? "c1.ogg" : "c2.ogg";
            const audio = new Audio(file);
            audio.play();
        }

        function toggleCollection() {
            playClickSound();
            const col = document.getElementById("collection");
            const about = document.getElementById("about");
            about.style.display = "none";
            col.style.display = (col.style.display === "block") ? "none" : "block";
        }

        function toggleAbout() {
            playClickSound();
            const about = document.getElementById("about");
            const col = document.getElementById("collection");
            col.style.display = "none";
            about.style.display = (about.style.display === "block") ? "none" : "block";
        }
    </script>
    <div id="blackout"></div>

</body>
</html>
