<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-image {
            max-width: 100%;
            height: auto;
        }

        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .taskbar img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <img src="gamerfre.png" class="center-image" alt="center image">

    <div class="taskbar">
        <img src="takbasr.png" alt="taskbar">
    </div>

</body>
</html>
