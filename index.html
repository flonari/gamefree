<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMEFREE.WIN</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: inline-block;
            position: relative;
        }

        .main-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .taskbar {
            position: relative;
        }

        .taskbar img {
            width: 100%;
            display: block;
        }

        /* CLICKABLE AREA */
        .click-zone {
            position: absolute;
            left: 19px;
            top: 10px;
            width: 69px;
            height: 28px;
            cursor: pointer;
        }

        /* ABOUT SECTION */
       .about {
    display: none;
    color: white;
    margin-top: 10px;
    max-width: 400px;
    text-align: center;

    /* PIXEL FONT */
    font-family: "Courier New", monospace;

    /* MAKE IT CHUNKY */
    font-size: 20px;
    letter-spacing: 2px;

    /* STRETCH EFFECT */
    transform: scaleY(1.8);
    
    /* KEEP IT SHARP (NO SMOOTHING) */
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
}
    </style>
</head>
<body>

    <div class="container">
        <img src="gamerfre.png" class="main-image" alt="main image">

        <div class="taskbar">
            <img src="takbasr14.png" alt="taskbar">

            <!-- Invisible clickable rectangle -->
            <div class="click-zone" onclick="toggleAbout()"></div>
        </div>
    </div>

    <div class="about" id="about">
        <p>
            the <br>
            gamerfree.win zxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcmnzxcm <br>
            play the games / watch the films  blarghblorghblorghblar<br>
            NNaNNaNNaNNaNNaNNaNNaNNa
        </p>
    </div>

    <script>
        function toggleAbout() {
            const about = document.getElementById("about");
            about.style.display = (about.style.display === "block") ? "none" : "block";
        }
    </script>

</body>
</html>
