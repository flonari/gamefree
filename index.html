<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        .main-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .taskbar img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="gamerfre.png" class="main-image" alt="main image">
        <div class="taskbar">
            <img src="takbasr.png" alt="taskbar">
        </div>
    </div>

</body>
</html>
